<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>media tags</h1>
    <h2>insertion of images</h2>
    <img src="./images/kiran pw photo.jpg" height="150" width="300" alt="kiran pw photo">
    <img src="./images/MYPC.jpg" alt="kiran pw photo">
    <img src="./images/funny image.jfif" alt="kiran pw photo">


    
    <h2>insertion of videos</h2>
    <video height="200" width="400" src="./videos/117331-711478804_small.mp4" autoplay muted loop>
    </video>

    <h2>insertion of audio</h2>
    <audio src="./" autoplay muted controls></audio>

    <h2>insertion of iframes</h2>
    <iframe src="./images/MYPIC.jpg"height="500" width="600" frameborder="0"></iframe>

    <h2>insertion of gif using marquee</h2>
    <marquee behavior="scroll" direction="right" scrollamount="30">
        <img src="./images/gif/mohamed_hassan-dog-7011_256.gif" alt="kiran pw photo">
    
    </marquee>
    <marquee behavior="scroll" direction="right" scrollamount="40">
        <img src="./images/gif/placidplace-emu-14760_256.gif" alt="kiran pw photo">
    </marquee>

</body>
</html>
